<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>销售业务数据看板</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
  background:linear-gradient(135deg,#eef2f7 0%,#f8f9fc 100%);
  min-height:100vh;padding:0 16px 40px;
}
.header{
  background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);
  margin:0 -16px;padding:20px 24px 14px;color:#fff;
  box-shadow:0 4px 20px rgba(0,0,0,0.12);
}
.header h1{font-size:24px;font-weight:700;letter-spacing:1px}
.header .sub{font-size:13px;color:#8899bb;margin-top:4px}
.hdr-time{float:right;font-size:13px;color:#6688aa;font-family:monospace;margin-top:-22px}
.cards{display:flex;gap:14px;justify-content:center;margin:18px 0;flex-wrap:wrap}
.card{
  background:#fff;border-radius:16px;padding:16px 24px;min-width:180px;
  text-align:center;box-shadow:0 4px 16px rgba(0,0,0,0.06);
  transition:transform 0.2s,box-shadow 0.2s;position:relative;overflow:hidden;
}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,0.1)}
.card .num{font-size:28px;font-weight:800;letter-spacing:-0.5px}
.card .lbl{font-size:13px;color:#888;margin-top:2px}
.card.gmv .num{color:#e74c3c}.card.assign .num{color:#3498db}.card.r .num{color:#27ae60}
.filter-bar{
  display:flex;gap:8px;align-items:center;justify-content:center;
  flex-wrap:wrap;margin:12px 0 8px;
}
.filter-group{
  display:flex;gap:8px;align-items:center;flex-wrap:wrap;
  background:#fff;border-radius:12px;padding:8px 14px;
  box-shadow:0 2px 8px rgba(0,0,0,0.04);
}
.filter-group label{font-size:12px;color:#888;font-weight:600}
.filter-bar select,.filter-bar button{
  padding:6px 10px;border:1px solid #e0e0e0;border-radius:8px;
  font-size:13px;background:#fff;color:#333;outline:none;cursor:pointer;
  min-width:100px;transition:border-color 0.2s;
}
.filter-bar select:focus{border-color:#3498db;box-shadow:0 0 0 2px rgba(52,152,219,0.15)}
.filter-bar button{background:#f5f7fa;color:#555;border-color:#ddd}
.filter-bar button:hover{background:#e8ecf2}
.compare-toggle{background:#fff2b0!important;color:#856404!important;border-color:#ffc107!important;font-weight:600}
.compare-toggle.active{background:#ffc107!important;color:#333!important}
.filter-tag{
  background:#e8f4fd;color:#3498db;padding:5px 12px;border-radius:8px;
  font-size:12px;display:inline-flex;align-items:center;gap:4px;
}
.filter-hint{text-align:center;font-size:12px;color:#999;min-height:18px;margin:0 0 8px}
.comp-group{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:8px 0}
.comp-group .filter-group{background:#fafbfc;box-shadow:0 1px 4px rgba(0,0,0,0.04);padding:6px 10px}
.comp-group .cmp-a{border-left:3px solid #e74c3c}
.comp-group .cmp-b{border-left:3px solid #3498db}
.cmp-label{font-size:11px;font-weight:700;padding:0 4px 4px}
.cmp-label.a{color:#e74c3c}.cmp-label.b{color:#3498db}
.sort-bar{
  display:flex;gap:8px;align-items:center;flex-wrap:wrap;
  padding:8px 14px;background:#f7f9fc;border-radius:10px;margin:8px 0;
}
.sort-bar label{font-size:12px;color:#888;font-weight:600}
.sort-bar select{padding:5px 8px;border:1px solid #ddd;border-radius:6px;font-size:12px;background:#fff}
.sort-bar button{padding:4px 12px;border:1px solid #ddd;border-radius:6px;font-size:12px;background:#fff;cursor:pointer}
.sort-bar button:hover{background:#eef2f7}
.sort-bar button.s-active{background:#3498db;color:#fff;border-color:#3498db}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:1600px;margin:0 auto}
.chart-box{
  background:#fff;border-radius:14px;padding:14px 12px;
  box-shadow:0 2px 12px rgba(0,0,0,0.05);transition:box-shadow 0.2s;
}
.chart-box:hover{box-shadow:0 4px 20px rgba(0,0,0,0.08)}
.chart-box.full{grid-column:1/-1}
.chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding:0 2px}
.chart-header h3{font-size:13px;color:#333;font-weight:700}
.chart-badge{font-size:10px;padding:2px 8px;border-radius:10px;background:#e8ecf2;color:#666}
.tbl-wrap{max-height:550px;overflow-y:auto;font-size:12px;border-radius:8px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{
  background:#f5f7fa;padding:7px 6px;text-align:left;font-weight:600;
  color:#444;border-bottom:2px solid #e0e4ea;position:sticky;top:0;
  white-space:nowrap;font-size:11px;user-select:none;
}
td{padding:5px 6px;border-bottom:1px solid #f0f2f6;white-space:nowrap}
tr:hover{background:#f5f7fc}
.num-col{text-align:right;font-variant-numeric:tabular-nums}
.rank{color:#999;font-size:11px;text-align:center;width:28px}
.green-bg{color:#27ae60!important;font-weight:700}
.red-bg{color:#e74c3c!important}
.diff-up{color:#27ae60}.diff-down{color:#e74c3c}
.loading{text-align:center;padding:60px;color:#999;font-size:14px}
.empty-state{text-align:center;padding:40px;color:#bbb;font-size:13px}
.top-btn{padding:3px 10px;font-size:11px;border:1px solid #ddd;border-radius:12px;background:#fff;cursor:pointer}
.top-btn:hover{background:#eef2f7}
.top-btn.on{background:#3498db;color:#fff;border-color:#3498db}
.comp-diff-chart{text-align:center;padding:10px;font-size:12px}
.diff-card{
  background:#f8f9fc;border-radius:10px;padding:10px 16px;text-align:center;
  border-left:4px solid #ddd;
}
.diff-card.better{border-left-color:#27ae60}
.diff-card.worse{border-left-color:#e74c3c}
@media(max-width:1000px){.grid,.comp-group{grid-template-columns:1fr}}
@media(max-width:600px){
  .filter-bar select,.filter-bar button{min-width:70px;font-size:12px}
  .card{padding:12px 16px;min-width:120px}
  .card .num{font-size:22px}
}
</style>
</head>
<body>
<div class="header">
  <span class="hdr-time" id="hdrTime"></span>
  <h1>📊 销售业务数据看板</h1>
  <div class="sub">多维度数据透视 · 支持时间对比与排序</div>
</div>
<div class="cards">
  <div class="card assign"><div class="num" id="numAssign">-</div><div class="lbl">📦 总分配数</div></div>
  <div class="card gmv"><div class="num" id="numGmv">-</div><div class="lbl">💰 总GMV</div></div>
  <div class="card r"><div class="num" id="numR">-</div><div class="lbl">📈 R值 (GMV÷分配数)</div></div>
</div>
<div class="filter-bar">
  <button id="cmpToggle" class="compare-toggle">🔁 对比模式</button>
  <div id="normalFilters" class="filter-group">
    <label>📅</label><select id="fDate"><option value="all">全部营期</option></select>
    <label>👥</label><select id="fTeam"><option value="all">全部小组</option></select>
    <label>🧑</label><select id="fSeller"><option value="all">全部销售</option></select>
  </div>
  <button id="resetBtn">⟳ 重置</button>
  <span class="filter-tag" id="filterTag">所有数据</span>
</div>
<div id="compareFilters" style="display:none;">
  <div class="comp-group">
    <div class="cmp-a" style="background:#fafbfc;border-radius:8px;padding:6px 10px;border-left:3px solid #e74c3c">
      <div class="cmp-label a">🔴 A组</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <label style="font-size:11px;color:#888">📅</label><select id="fDateA" style="padding:4px 6px;border:1px solid #ddd;border-radius:6px;font-size:12px;background:#fff"><option value="all">全部营期</option></select>
        <label style="font-size:11px;color:#888">👥</label><select id="fTeamA" style="padding:4px 6px;border:1px solid #ddd;border-radius:6px;font-size:12px;background:#fff"><option value="all">全部小组</option></select>
        <label style="font-size:11px;color:#888">🧑</label><select id="fSellerA" style="padding:4px 6px;border:1px solid #ddd;border-radius:6px;font-size:12px;background:#fff"><option value="all">全部销售</option></select>
      </div>
    </div>
    <div class="cmp-b" style="background:#fafbfc;border-radius:8px;padding:6px 10px;border-left:3px solid #3498db">
      <div class="cmp-label b">🔵 B组</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <label style="font-size:11px;color:#888">📅</label><select id="fDateB" style="padding:4px 6px;border:1px solid #ddd;border-radius:6px;font-size:12px;background:#fff"><option value="all">全部营期</option></select>
        <label style="font-size:11px;color:#888">👥</label><select id="fTeamB" style="padding:4px 6px;border:1px solid #ddd;border-radius:6px;font-size:12px;background:#fff"><option value="all">全部小组</option></select>
        <label style="font-size:11px;color:#888">🧑</label><select id="fSellerB" style="padding:4px 6px;border:1px solid #ddd;border-radius:6px;font-size:12px;background:#fff"><option value="all">全部销售</option></select>
      </div>
    </div>
  </div>
</div>
<div class="filter-hint" id="filterHint"></div>
<div class="grid" id="chartGrid"><div class="loading full">⏳ 加载中...</div></div>

<script>
// ===== Data Loading =====
var DATA = null;
var sellerAgg = [];

function initData(data) {
  DATA = data;
  sellerAgg = DATA.sellerAgg;
  document.querySelector('.loading').textContent = '';
  buildOptions();
  render();
}

// Try loading data.json, fallback to embedded
(function loadExternalData() {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', 'data.json', true);
  xhr.onload = function() {
    if (xhr.status === 200) { try { initData(JSON.parse(xhr.responseText)); return; } catch(e) {} }
    loadInlineData();
  };
  xhr.onerror = function() { loadInlineData(); };
  xhr.send();
})();

// ===== Time =====
function updateClock() {
  var d = new Date();
  var s = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0');
  document.getElementById('hdrTime').textContent = '🕐 '+s;
}
setInterval(updateClock,1000);updateClock();

// ===== Compare Mode =====
var isCompare = false;
document.getElementById('cmpToggle').addEventListener('click', function() {
  isCompare = !isCompare;
  this.classList.toggle('active');
  document.getElementById('normalFilters').style.display = isCompare ? 'none' : 'flex';
  document.getElementById('compareFilters').style.display = isCompare ? 'block' : 'none';
  if (isCompare && DATA) {
    ['Date','Team','Seller'].forEach(function(k) {
      document.getElementById('fDate'+k).value = document.getElementById('fDate').value;
      document.getElementById('fTeam'+k).value = document.getElementById('fTeam').value;
      document.getElementById('fSeller'+k).value = document.getElementById('fSeller').value;
    });
    buildOptions(); render();
  } else if (DATA) { render(); }
});

// ===== Build Options (bidirectional cascading) =====
function buildOptions() {
  if (!DATA) return;
  buildNormalOptions();
  if (isCompare) buildCompareOptions();
  updateFilterHint();
}

function buildNormalOptions() {
  var selD = document.getElementById('fDate'), selT = document.getElementById('fTeam'), selS = document.getElementById('fSeller');
  var selDate = selD.value, selTeam = selT.value, selSeller = selS.value;

  var availDates = new Set();
  if (selSeller !== 'all') sellerAgg.forEach(function(s){if(s['花名']===selSeller)s['大期'].forEach(function(d){availDates.add(d);});});
  else if (selTeam !== 'all') Object.keys(DATA.dateToTeam).forEach(function(d){if(DATA.dateToTeam[d].indexOf(selTeam)>=0)availDates.add(d);});
  else DATA.dates.forEach(function(d){availDates.add(d);});
  var dateList = Array.from(availDates).sort();
  selD.innerHTML = '<option value="all">📅 全部营期</option>';
  dateList.forEach(function(d){selD.innerHTML+='<option value="'+d+'">'+d.replace('VT','')+'</option>';});
  if(selDate!=='all'&&dateList.indexOf(selDate)>=0)selD.value=selDate;else selD.value='all';
  selDate=selD.value;

  var availTeams = new Set();
  if(selSeller!=='all') sellerAgg.forEach(function(s){if(s['花名']===selSeller)availTeams.add(s['小组']);});
  else if(selDate!=='all') (DATA.dateToTeam[selDate]||[]).forEach(function(t){availTeams.add(t);});
  else DATA.teams.forEach(function(t){availTeams.add(t);});
  var teamList = Array.from(availTeams).sort();
  selT.innerHTML='<option value="all">👥 全部小组</option>';
  teamList.forEach(function(t){selT.innerHTML+='<option value="'+t+'">'+t+'</option>';});
  if(selTeam!=='all'&&teamList.indexOf(selTeam)>=0)selT.value=selTeam;else selT.value='all';
  selTeam=selT.value;

  var availSellers = new Set();
  if(selDate==='all'&&selTeam==='all') DATA.sellers.forEach(function(s){availSellers.add(s);});
  else if(selDate!=='all'&&selTeam==='all') (DATA.dateToSeller[selDate]||[]).forEach(function(s){availSellers.add(s);});
  else if(selDate==='all'&&selTeam!=='all') (DATA.teamToSeller[selTeam]||[]).forEach(function(s){availSellers.add(s);});
  else{var bD=new Set(DATA.dateToSeller[selDate]||[]);var bT=new Set(DATA.teamToSeller[selTeam]||[]);bD.forEach(function(s){if(bT.has(s))availSellers.add(s);});}
  var sellerList = Array.from(availSellers).sort();
  selS.innerHTML='<option value="all">🧑 全部销售</option>';
  sellerList.forEach(function(s){selS.innerHTML+='<option value="'+s+'">'+s+'</option>';});
  if(selSeller!=='all'&&sellerList.indexOf(selSeller)>=0)selS.value=selSeller;else selS.value='all';
}

function buildCompareOptions() {
  ['A','B'].forEach(function(sfx) {
    var selD=document.getElementById('fDate'+sfx), selT=document.getElementById('fTeam'+sfx), selS=document.getElementById('fSeller'+sfx);
    if(!selD)return;
    // Show all options for compare (simpler UX)
    selD.innerHTML='<option value="all">📅 全部营期</option>';
    DATA.dates.forEach(function(d){selD.innerHTML+='<option value="'+d+'">'+d.replace('VT','')+'</option>';});
    selT.innerHTML='<option value="all">👥 全部小组</option>';
    DATA.teams.forEach(function(t){selT.innerHTML+='<option value="'+t+'">'+t+'</option>';});
    selS.innerHTML='<option value="all">🧑 全部销售</option>';
    DATA.sellers.forEach(function(s){selS.innerHTML+='<option value="'+s+'">'+s+'</option>';});
    // Restore values
    if(selD.getAttribute('data-val'))selD.value=selD.getAttribute('data-val');
    if(selT.getAttribute('data-val'))selT.value=selT.getAttribute('data-val');
    if(selS.getAttribute('data-val'))selS.value=selS.getAttribute('data-val');
  });
}

function updateFilterHint() {
  var d=document.getElementById('fDate').value,t=document.getElementById('fTeam').value,s=document.getElementById('fSeller').value;
  var parts=[];
  if(d!=='all')parts.push('营期:'+d.replace('VT',''));
  if(t!=='all')parts.push('小组:'+t);
  if(s!=='all')parts.push('销售:'+s);
  document.getElementById('filterHint').textContent=parts.length>0?'当前筛选: '+parts.join(' · ')+(s==='all'?' ('+document.getElementById('fSeller').options.length+'位销售)':''):'';
  document.getElementById('filterTag').textContent=s!=='all'?s:(t!=='all'?t:(d!=='all'?d.replace('VT',''):'所有数据'));
}

// ===== Filter =====
function getFiltered(dv,tv,sv) {
  var d=dv||document.getElementById('fDate').value, t=tv||document.getElementById('fTeam').value, s=sv||document.getElementById('fSeller').value;
  var list=sellerAgg.slice();
  if(d!=='all')list=list.filter(function(x){return x['大期'].indexOf(d)>=0;});
  if(t!=='all')list=list.filter(function(x){return x['小组']===t;});
  if(s!=='all')list=list.filter(function(x){return x['花名']===s;});
  var aT=list.reduce(function(a,x){return a+x['分配数'];},0);
  var gT=list.reduce(function(a,x){return a+x['GMV '];},0);
  var rV=aT>0?(gT/aT).toFixed(2):'0.00';
  return {list:list,assignTotal:aT,gmvTotal:gT,rVal:rV};
}

function getFilteredCompare(sfx) {
  return getFiltered(document.getElementById('fDate'+sfx).value,document.getElementById('fTeam'+sfx).value,document.getElementById('fSeller'+sfx).value);
}

// ===== Sort State =====
var sortField = 'GMV ';
var sortDesc = true;
var topN = 0;

// ===== Render =====
function render() {
  if(!DATA)return;
  var grid=document.getElementById('chartGrid');grid.innerHTML='';
  if(isCompare){renderCompare(grid);}else{renderNormal(grid);}
}

function renderNormal(grid) {
  var filter = getFiltered();
  document.getElementById('numAssign').textContent=filter.assignTotal.toLocaleString();
  document.getElementById('numGmv').textContent='¥'+filter.gmvTotal.toLocaleString();
  document.getElementById('numR').textContent=filter.rVal;

  addChart(grid,'📅 营期趋势：GMV & R值','full',function(div){
    var agg={};filter.list.forEach(function(x){x['大期'].forEach(function(d){if(!agg[d])agg[d]={g:0,a:0};agg[d].g+=x['GMV '];agg[d].a+=x['分配数'];});});
    var keys=Object.keys(agg).sort();
    if(!keys.length){div.innerHTML='<div class="empty-state">暂无数据</div>';return;}
    Plotly.newPlot(div,[
      {x:keys,y:keys.map(function(k){return agg[k].g;}),type:'bar',name:'GMV',marker:{color:'#e74c3c',opacity:0.8},hovertemplate:'%{x}<br>GMV: ¥%{y:,}<extra></extra>',yaxis:'y'},
      {x:keys,y:keys.map(function(k){return agg[k].a>0?agg[k].g/agg[k].a:0;}),type:'scatter',mode:'lines+markers',name:'R值(元/人)',line:{color:'#27ae60',width:3},marker:{size:9,symbol:'diamond'},yaxis:'y2'}
    ],{margin:{t:8,r:60,b:35,l:55},paper_bgcolor:'rgba(0,0,0,0)',plot_bgcolor:'rgba(0,0,0,0)',xaxis:{tickangle:-35},yaxis:{tickformat:','},yaxis2:{overlaying:'y',side:'right',tickprefix:'¥',title:{text:'R值'}},legend:{orientation:'h',y:1.08,x:0.3},hovermode:'x unified'},{responsive:true});
  });

  addChart(grid,'🏆 小组GMV排行',1,function(div){
    var agg={};filter.list.forEach(function(x){var t=x['小组'];if(!agg[t])agg[t]={g:0};agg[t].g+=x['GMV '];});
    var names=Object.keys(agg).sort(function(a,b){return agg[b].g-agg[a].g;});
    if(!names.length){div.innerHTML='<div class="empty-state">暂无数据</div>';return;}
    var clrs=['#FF6B6B','#F39C12','#3498DB','#2ECC71','#9B59B6'];
    Plotly.newPlot(div,[{x:names.map(function(n){return agg[n].g;}),y:names,type:'bar',orientation:'h',marker:{color:clrs.slice(0,names.length)},textposition:'outside'}],{margin:{t:5,r:80,b:20,l:65},paper_bgcolor:'rgba(0,0,0,0)',plot_bgcolor:'rgba(0,0,0,0)',xaxis:{tickformat:','}},{responsive:true});
  });

  addChart(grid,'📞 声测率趋势',1,function(div){
    var agg={};filter.list.forEach(function(x){x['大期'].forEach(function(d){if(!agg[d])agg[d]={s:0,c:0};agg[d].s+=x['声测率'];agg[d].c+=1;});});
    var keys=Object.keys(agg).sort();
    if(!keys.length){div.innerHTML='<div class="empty-state">暂无数据</div>';return;}
    Plotly.newPlot(div,[
      {x:keys,y:keys.map(function(k){return agg[k].s/agg[k].c;}),type:'scatter',mode:'lines+markers',name:'声测率',line:{color:'#e74c3c',width:3},marker:{size:8}},
      {x:keys,y:keys.map(function(){return 0.2;}),type:'scatter',mode:'lines',line:{color:'#e74c3c',width:1,dash:'dash'},name:'⚠️20%警戒线'}
    ],{margin:{t:8,r:15,b:35,l:45},paper_bgcolor:'rgba(0,0,0,0)',plot_bgcolor:'rgba(0,0,0,0)',xaxis:{tickangle:-35},yaxis:{tickformat:'.0%'}},{responsive:true});
  });

  addChart(grid,'📖 D0-D1到课率趋势',1,function(div){
    var agg={};filter.list.forEach(function(x){x['大期'].forEach(function(d){if(!agg[d])agg[d]={d0:0,d1:0,c:0};agg[d].d0+=x['D0到课率'];agg[d].d1+=x['D1到课率'];agg[d].c+=1;});});
    var keys=Object.keys(agg).sort();
    if(!keys.length){div.innerHTML='<div class="empty-state">暂无数据</div>';return;}
    Plotly.newPlot(div,[
      {x:keys,y:keys.map(function(k){return agg[k].d0/agg[k].c;}),type:'scatter',mode:'lines+markers',name:'D0到课率',line:{color:'#3498DB',width:2.5},marker:{size:7}},
      {x:keys,y:keys.map(function(k){return agg[k].d1/agg[k].c;}),type:'scatter',mode:'lines+markers',name:'D1到课率',line:{color:'#2ECC71',width:2.5},marker:{size:7}}
    ],{margin:{t:8,r:15,b:35,l:45},paper_bgcolor:'rgba(0,0,0,0)',plot_bgcolor:'rgba(0,0,0,0)',xaxis:{tickangle:-35},yaxis:{tickformat:'.0%'}},{responsive:true});
  });

  // Seller ranking
  var sList = getSortedList(filter);
  addChart(grid,'🏅 销售排行 TOP'+Math.min(sList.length,15),'full',function(div){
    var top=sList.slice(0,15);
    if(!top.length){div.innerHTML='<div class="empty-state">暂无数据</div>';return;}
    var clrs={'奇文组':'#e74c3c','奇怡组':'#f39c12','奇飞组':'#3498db','奇豪组':'#2ecc71','奇可组':'#9b59b6'};
    var names=top.map(function(s,i){var m=['🥇','🥈','🥉'];return (i<3?m[i]+' ':'')+s['花名'];});
    Plotly.newPlot(div,[{x:top.map(function(s){return s['GMV '];}),y:names,type:'bar',orientation:'h',marker:{color:top.map(function(s){return clrs[s['小组']]||'#999';})},textposition:'outside'}],{margin:{t:5,r:110,b:20,l:80},paper_bgcolor:'rgba(0,0,0,0)',plot_bgcolor:'rgba(0,0,0,0)',xaxis:{tickformat:','},height:Math.max(300,top.length*34+50)},{responsive:true});
  });

  // Detail Table
  addChart(grid,'📋 个人明细'+(topN>0?' TOP'+topN:''),'full',function(div){
    var items = getSortedList(filter);
    div.innerHTML = buildSortBarUI() + buildTable(items);
    setTimeout(function(){bindSortEvents();},30);
  });
}

function getSortedList(filter) {
  var list = filter.list.slice();
  var sf = sortField || 'GMV ';
  list.sort(function(a,b){var av=a[sf]||0,bv=b[sf]||0;return sortDesc?bv-av:av-bv;});
  return topN>0 ? list.slice(0,topN) : list;
}

// ===== Sort UI =====
function buildSortBarUI() {
  var fields=[['GMV ','GMV'],['分配数','分配数'],['R值(元/人)','R值'],['声测率','声测率'],['D0到课率','D0到课率'],['D1到课率','D1到课率'],['R值完成率','R值完成率']];
  var opts=fields.map(function(f){return '<option value="'+f[0]+'"'+(sortField===f[0]?' selected':'')+'>'+f[1]+'</option>';}).join('');
  return '<div class="sort-bar"><label>🔽 按:</label><select id="sortField">'+opts+'</select><button id="sortDirBtn">'+'▼ '+'</button><span style="color:#ccc;margin:0 4px">|</span><button class="top-btn'+(topN===0?' on':'')+'" data-n="0">全部</button><button class="top-btn'+(topN===10?' on':'')+'" data-n="10">前10</button><button class="top-btn'+(topN===20?' on':'')+'" data-n="20">前20</button></div>';
}

function bindSortEvents() {
  var sf=document.getElementById('sortField');
  if(sf)sf.onchange=function(){sortField=this.value;render();};
  var dir=document.getElementById('sortDirBtn');
  if(dir)dir.onclick=function(){sortDesc=!sortDesc;dir.textContent=sortDesc?'▼ ':'▲ ';render();};
  document.querySelectorAll('.top-btn').forEach(function(b){b.onclick=function(){topN=parseInt(this.getAttribute('data-n'));render();};});
}

// ===== Table =====
function buildTable(list) {
  var h='<tr><th style="text-align:center">#</th><th>花名</th><th>小组</th><th>参与</th><th class="num-col">分配数</th><th class="num-col">GMV</th><th class="num-col">R值</th><th class="num-col">R值完成率</th><th class="num-col">声测率</th><th class="num-col">D0到课率</th><th class="num-col">D1到课率</th></tr>';
  var m=['🥇','🥈','🥉'];
  list.forEach(function(s,i){
    var r=s['GMV ']>0&&s['分配数']>0?(s['GMV ']/s['分配数']).toFixed(2):'-';
    var rp=(s['R值完成率']*100).toFixed(1);
    var rc=parseFloat(rp)>=100?'green-bg':(parseFloat(rp)<80?'red-bg':'');
    h+='<tr><td class="rank">'+(i<3?m[i]:i+1)+'</td>'
      +'<td><b>'+s['花名']+'</b></td>'
      +'<td>'+s['小组']+'</td>'
      +'<td>'+s['参与期数']+'期/'+s['次数']+'次</td>'
      +'<td class="num-col">'+s['分配数'].toLocaleString()+'</td>'
      +'<td class="num-col">¥'+s['GMV '].toLocaleString()+'</td>'
      +'<td class="num-col">¥'+r+'</td>'
      +'<td class="num-col '+rc+'">'+rp+'%</td>'
      +'<td class="num-col">'+(s['声测率']*100).toFixed(1)+'%</td>'
      +'<td class="num-col">'+(s['D0到课率']*100).toFixed(1)+'%</td>'
      +'<td class="num-col">'+(s['D1到课率']*100).toFixed(1)+'%</td></tr>';
  });
  return '<div class="tbl-wrap"><table>'+h+'</table></div>';
}

// ===== Compare Mode =====
function renderCompare(grid) {
  var fA = getFilteredCompare('A'), fB = getFilteredCompare('B');
  
  // Diff cards
  var da = fA.assignTotal, db = fB.assignTotal;
  var ga = fA.gmvTotal, gb = fB.gmvTotal;
  var ra = parseFloat(fA.rVal), rb = parseFloat(fB.rVal);
  var assignDiff = db>0?(((da-db)/db)*100).toFixed(1):'∞';
  var gmvDiff = gb>0?(((ga-gb)/gb)*100).toFixed(1):'∞';
  var rDiff = rb>0?(((ra-rb)/rb)*100).toFixed(1):'∞';
  var arrow = function(v){return parseFloat(v)>0?'<span class="diff-up">▲'+v+'%</span>':(parseFloat(v)<0?'<span class="diff-down">▼'+Math.abs(parseFloat(v))+'%</span>':'<span class="diff-same">-</span>');};
  
  var diffHtml = '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px">';
  diffHtml += '<div class="diff-card"><div style="font-size:11px;color:#888">📦 分配数</div><div style="font-size:18px;font-weight:700;color:#333">A:'+da.toLocaleString()+'<br>B:'+db.toLocaleString()+'</div><div style="font-size:13px;margin-top:4px">'+arrow(assignDiff)+'</div></div>';
  diffHtml += '<div class="diff-card"><div style="font-size:11px;color:#888">💰 GMV</div><div style="font-size:18px;font-weight:700;color:#e74c3c">A:¥'+ga.toLocaleString()+'<br>B:¥'+gb.toLocaleString()+'</div><div style="font-size:13px;margin-top:4px">'+arrow(gmvDiff)+'</div></div>';
  diffHtml += '<div class="diff-card"><div style="font-size:11px;color:#888">📈 R值</div><div style="font-size:18px;font-weight:700;color:#27ae60">A:'+ra+'<br>B:'+rb+'</div><div style="font-size:13px;margin-top:4px">'+arrow(rDiff)+'</div></div>';
  diffHtml += '</div>';
  
  var c = document.createElement('div');
  c.className = 'chart-box full';
  c.innerHTML = '<h3 style="font-size:14px;padding:4px 2px 8px;color:#333">🔁 对比概览</h3>'+diffHtml;
  grid.appendChild(c);
  
  // Compare chart: GMV bar side by side
  addChart(grid,'💰 GMV对比 (红=A 蓝=B)','full',function(div){
    var aggA={},aggB={};
    fA.list.forEach(function(x){x['大期'].forEach(function(d){if(!aggA[d])aggA[d]={g:0};aggA[d].g+=x['GMV '];});});
    fB.list.forEach(function(x){x['大期'].forEach(function(d){if(!aggB[d])aggB[d]={g:0};aggB[d].g+=x['GMV '];});});
    var allKeys = new Set(Object.keys(aggA).concat(Object.keys(aggB)));
    var keys = Array.from(allKeys).sort();
    if(!keys.length){div.innerHTML='<div class="empty-state">暂无数据</div>';return;}
    Plotly.newPlot(div,[
      {x:keys,y:keys.map(function(k){return (aggA[k]||{g:0}).g;}),type:'bar',name:'A组 GMV',marker:{color:'#e74c3c',opacity:0.8}},
      {x:keys,y:keys.map(function(k){return (aggB[k]||{g:0}).g;}),type:'bar',name:'B组 GMV',marker:{color:'#3498db',opacity:0.8}}
    ],{margin:{t:8,r:15,b:35,l:55},paper_bgcolor:'rgba(0,0,0,0)',plot_bgcolor:'rgba(0,0,0,0)',xaxis:{tickangle:-35},yaxis:{tickformat:','},barmode:'group',legend:{orientation:'h',y:1.08,x:0.3}},{responsive:true});
  });
  
  // R value comparison
  addChart(grid,'📈 R值对比 (红=A 蓝=B)','full',function(div){
    var aggA={},aggB={};
    fA.list.forEach(function(x){x['大期'].forEach(function(d){if(!aggA[d])aggA[d]={g:0,a:0};aggA[d].g+=x['GMV '];aggA[d].a+=x['分配数'];});});
    fB.list.forEach(function(x){x['大期'].forEach(function(d){if(!aggB[d])aggB[d]={g:0,a:0};aggB[d].g+=x['GMV '];aggB[d].a+=x['分配数'];});});
    var allKeys = new Set(Object.keys(aggA).concat(Object.keys(aggB)));
    var keys = Array.from(allKeys).sort();
    if(!keys.length){div.innerHTML='<div class="empty-state">暂无数据</div>';return;}
    var valA=keys.map(function(k){var o=aggA[k];return o&&o.a>0?o.g/o.a:0;});
    var valB=keys.map(function(k){var o=aggB[k];return o&&o.a>0?o.g/o.a:0;});
    Plotly.newPlot(div,[
      {x:keys,y:valA,type:'scatter',mode:'lines+markers',name:'A组 R值',line:{color:'#e74c3c',width:2.5},marker:{size:8}},
      {x:keys,y:valB,type:'scatter',mode:'lines+markers',name:'B组 R值',line:{color:'#3498db',width:2.5},marker:{size:8}}
    ],{margin:{t:8,r:15,b:35,l:45},paper_bgcolor:'rgba(0,0,0,0)',plot_bgcolor:'rgba(0,0,0,0)',xaxis:{tickangle:-35},yaxis:{tickprefix:'¥'},legend:{orientation:'h',y:1.08,x:0.3}},{responsive:true});
  });
  
  // Compare: 声测率
  addChart(grid,'📞 声测率对比','full',function(div){
    var aggA={},aggB={};
    fA.list.forEach(function(x){x['大期'].forEach(function(d){if(!aggA[d])aggA[d]={s:0,c:0};aggA[d].s+=x['声测率'];aggA[d].c+=1;});});
    fB.list.forEach(function(x){x['大期'].forEach(function(d){if(!aggB[d])aggB[d]={s:0,c:0};aggB[d].s+=x['声测率'];aggB[d].c+=1;});});
    var allKeys=new Set(Object.keys(aggA).concat(Object.keys(aggB)));
    var keys=Array.from(allKeys).sort();
    if(!keys.length){div.innerHTML='<div class="empty-state">暂无数据</div>';return;}
    Plotly.newPlot(div,[
      {x:keys,y:keys.map(function(k){return aggA[k]?aggA[k].s/aggA[k].c:0;}),type:'scatter',mode:'lines+markers',name:'A组 声测率',line:{color:'#e74c3c',width:2.5},marker:{size:8}},
      {x:keys,y:keys.map(function(k){return aggB[k]?aggB[k].s/aggB[k].c:0;}),type:'scatter',mode:'lines+markers',name:'B组 声测率',line:{color:'#3498db',width:2.5},marker:{size:8}}
    ],{margin:{t:8,r:15,b:35,l:45},paper_bgcolor:'rgba(0,0,0,0)',plot_bgcolor:'rgba(0,0,0,0)',xaxis:{tickangle:-35},yaxis:{tickformat:'.0%'},legend:{orientation:'h',y:1.08,x:0.3}},{responsive:true});
  });
  
  // Compare: D0-D1
  addChart(grid,'📖 D0-D1到课率对比','full',function(div){
    var aggA={},aggB={};
    fA.list.forEach(function(x){x['大期'].forEach(function(d){if(!aggA[d])aggA[d]={d0:0,d1:0,c:0};aggA[d].d0+=x['D0到课率'];aggA[d].d1+=x['D1到课率'];aggA[d].c+=1;});});
    fB.list.forEach(function(x){x['大期'].forEach(function(d){if(!aggB[d])aggB[d]={d0:0,d1:0,c:0};aggB[d].d0+=x['D0到课率'];aggB[d].d1+=x['D1到课率'];aggB[d].c+=1;});});
    var allKeys=new Set(Object.keys(aggA).concat(Object.keys(aggB)));
    var keys=Array.from(allKeys).sort();
    if(!keys.length){div.innerHTML='<div class="empty-state">暂无数据</div>';return;}
    Plotly.newPlot(div,[
      {x:keys,y:keys.map(function(k){return aggA[k]?aggA[k].d0/aggA[k].c:0;}),type:'scatter',mode:'lines+markers',name:'A组 D0',line:{color:'#e74c3c',width:2,dash:'dash'},marker:{size:7,symbol:'square'}},
      {x:keys,y:keys.map(function(k){return aggA[k]?aggA[k].d1/aggA[k].c:0;}),type:'scatter',mode:'lines+markers',name:'A组 D1',line:{color:'#e74c3c',width:2},marker:{size:7}},
      {x:keys,y:keys.map(function(k){return aggB[k]?aggB[k].d0/aggB[k].c:0;}),type:'scatter',mode:'lines+markers',name:'B组 D0',line:{color:'#3498db',width:2,dash:'dash'},marker:{size:7,symbol:'square'}},
      {x:keys,y:keys.map(function(k){return aggB[k]?aggB[k].d1/aggB[k].c:0;}),type:'scatter',mode:'lines+markers',name:'B组 D1',line:{color:'#3498db',width:2},marker:{size:7}}
    ],{margin:{t:8,r:15,b:35,l:45},paper_bgcolor:'rgba(0,0,0,0)',plot_bgcolor:'rgba(0,0,0,0)',xaxis:{tickangle:-35},yaxis:{tickformat:'.0%'},legend:{orientation:'h',y:1.08,x:0},height:400},{responsive:true});
  });
  
  // Compare seller table
  addChart(grid,'📋 对比明细','full',function(div){
    var listA=getSortedList(fA),listB=getSortedList(fB);
    var allSellers={};
    listA.forEach(function(s){allSellers[s['花名']]=s;});
    listB.forEach(function(s){if(!allSellers[s['花名']])allSellers[s['花名']]=s;});
    var allNames=Object.keys(allSellers).sort();
    var h='<tr><th>花名</th><th class="num-col">A分配数</th><th class="num-col">B分配数</th><th class="num-col">A GMV</th><th class="num-col">B GMV</th><th class="num-col">A R值</th><th class="num-col">B R值</th></tr>';
    allNames.forEach(function(nm){
      var a=listA.filter(function(x){return x['花名']===nm;})[0]||{}, b=listB.filter(function(x){return x['花名']===nm;})[0]||{};
      var aA=a['分配数']||0,bA=b['分配数']||0,aG=a['GMV ']||0,bG=b['GMV ']||0;
      var aR=aA>0?((aG/aA).toFixed(2)):'-',bR=bA>0?((bG/bA).toFixed(2)):'-';
      var diffA=aA-bA,diffG=aG-bG;
      h+='<tr><td><b>'+nm+'</b></td>'
        +'<td class="num-col">'+aA.toLocaleString()+' <span class="'+(diffA>0?'diff-up':diffA<0?'diff-down':'diff-same')+'">'+(diffA>0?'▲':diffA<0?'▼':'')+(diffA?Math.abs(diffA).toLocaleString():'')+'</span></td>'
        +'<td class="num-col">'+bA.toLocaleString()+'</td>'
        +'<td class="num-col">¥'+aG.toLocaleString()+' <span class="'+(diffG>0?'diff-up':diffG<0?'diff-down':'diff-same')+'">'+(diffG>0?'▲':diffG<0?'▼':'')+(diffG?Math.abs(diffG).toLocaleString():'')+'</span></td>'
        +'<td class="num-col">¥'+bG.toLocaleString()+'</td>'
        +'<td class="num-col">'+aR+'</td>'
        +'<td class="num-col">'+bR+'</td></tr>';
    });
    div.innerHTML = '<div class="tbl-wrap"><table>'+h+'</table></div>';
  });
}

// ===== Chart Helper =====
function addChart(grid, title, cols, makeChart) {
  var box = document.createElement('div');
  box.className = 'chart-box' + (cols==='full'?' full':'');
  box.innerHTML = '<div class="chart-header"><h3>'+title+'</h3></div><div class="plot"></div>';
  grid.appendChild(box);
  setTimeout(function(){ makeChart(box.querySelector('.plot')); }, 30);
}

// ===== Event Binding =====
document.getElementById('resetBtn').addEventListener('click', function() {
  if (isCompare) { document.getElementById('cmpToggle').click(); }
  document.getElementById('fDate').value = 'all';
  document.getElementById('fTeam').value = 'all';
  document.getElementById('fSeller').value = 'all';
  sortField = 'GMV '; sortDesc = true; topN = 0;
  if (DATA) { buildOptions(); render(); }
});

document.getElementById('fDate').addEventListener('change', function(){if(DATA){buildOptions();render();}});
document.getElementById('fTeam').addEventListener('change', function(){if(DATA){buildOptions();render();}});
document.getElementById('fSeller').addEventListener('change', function(){if(DATA){buildOptions();render();}});

function loadInlineData() {
  // Try loading embed_data.js as fallback
  var s = document.createElement('script');
  s.src = 'embed_data.js';
  s.onload = function() {
    if (typeof EMBEDDED_DATA !== 'undefined' && EMBEDDED_DATA && EMBEDDED_DATA.sellerAgg) {
      initData(EMBEDDED_DATA);
    }
  };
  document.body.appendChild(s);
}
