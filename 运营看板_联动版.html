tr:hover{background:#f7f8fa}
.num-col{text-align:right}
.rank{color:#999;font-size:11px}
.loading{text-align:center;padding:60px;color:#999;font-size:14px}
.selected-hint{text-align:center;font-size:12px;color:#8c8c8c;margin:-5px 0 10px;min-height:18px}

// ====== 三级联动（双向）：任选一个，其他都只显示相关选项 ======
function buildOptions() {
  var selD = document.getElementById('fDate');
  var selT = document.getElementById('fTeam');
  var selS = document.getElementById('fSeller');
  
  // 读取当前选择的各选项值
  var selDate = selD.value;
  var selTeam = selT.value;
  var selSeller = selS.value;
  
  // ===== 从原始数据计算所有销售参与的大期和小组 =====
  // 先找出所有销售（去重）
  var allSellers = DATA.sellers;
  
  // ===== 1. 营期可选项 =====
  var availableDates = new Set();
  
  if (selSeller !== 'all') {
    // 选了销售 → 只显示该销售参与的期数
    sellerAgg.forEach(function(s) {
      if (s['花名'] === selSeller) {
        s['大期'].forEach(function(d) { availableDates.add(d); });
      }
    });
  } else if (selTeam !== 'all') {
    // 选了小组 → 只显示该小组有数据的期数
    DATA.teams.forEach(function(t) {
      if (t === selTeam) {
        Object.keys(DATA.dateToTeam).forEach(function(d) {
          if (DATA.dateToTeam[d].indexOf(t) >= 0) availableDates.add(d);
        });
      }
    });
  } else {
    DATA.dates.forEach(function(d) { availableDates.add(d); });
  }
  
  var dateList = Array.from(availableDates).sort();
  selD.innerHTML = '<option value="all">📅 全部营期</option>';
  dateList.forEach(function(d) {
    selD.innerHTML += '<option value="' + d + '">' + d.replace('VT','') + '</option>';
  });
  if (selDate !== 'all' && dateList.indexOf(selDate) >= 0) selD.value = selDate;
  else selD.value = 'all';
  selDate = selD.value;
  
  // ===== 2. 小组可选项 =====
  var availableTeams = new Set();
  
  if (selSeller !== 'all') {
    // 选了销售 → 只显示该销售所在的小组
    sellerAgg.forEach(function(s) {
      if (s['花名'] === selSeller) availableTeams.add(s['小组']);
    });
  } else if (selDate !== 'all') {
    // 选了日期 → 只显示该日期有数据的小组
    (DATA.dateToTeam[selDate] || []).forEach(function(t) { availableTeams.add(t); });
  } else {
    DATA.teams.forEach(function(t) { availableTeams.add(t); });
  }
  
  var teamList = Array.from(availableTeams).sort();
  selT.innerHTML = '<option value="all">👥 全部小组</option>';
  teamList.forEach(function(t) {
    selT.innerHTML += '<option value="' + t + '">' + t + '</option>';
  });
  if (selTeam !== 'all' && teamList.indexOf(selTeam) >= 0) selT.value = selTeam;
  else selT.value = 'all';
  selTeam = selT.value;
  
  // ===== 3. 销售可选项 =====
  var availableSellers = new Set();
  
  // 收集候选销售
  if (selDate === 'all' && selTeam === 'all') {
    DATA.sellers.forEach(function(s) { availableSellers.add(s); });
  } else if (selDate !== 'all' && selTeam === 'all') {
    // 只选了日期
    (DATA.dateToSeller[selDate] || []).forEach(function(s) { availableSellers.add(s); });
  } else if (selDate === 'all' && selTeam !== 'all') {
    // 只选了小组
    (DATA.teamToSeller[selTeam] || []).forEach(function(s) { availableSellers.add(s); });
  } else {
    // 日期+小组都选了 → 取交集
    var byDateSet = new Set(DATA.dateToSeller[selDate] || []);
    var byTeamSet = new Set(DATA.teamToSeller[selTeam] || []);
    byDateSet.forEach(function(s) { if (byTeamSet.has(s)) availableSellers.add(s); });
  }
  
  var sellerList = Array.from(availableSellers).sort();
  selS.innerHTML = '<option value="all">🧑 全部销售</option>';
  sellerList.forEach(function(s) {
    selS.innerHTML += '<option value="' + s + '">' + s + '</option>';
  });
  if (selSeller !== 'all' && sellerList.indexOf(selSeller) >= 0) selS.value = selSeller;
  else selS.value = 'all';
  
  // 更新提示
  var parts = [];
  if (selDate !== 'all') parts.push('营期:' + selDate.replace('VT',''));
  if (selTeam !== 'all') parts.push('小组:' + selTeam);
  if (selS.value !== 'all') parts.push('销售:' + selS.value);
  
  document.getElementById('filterHint').textContent = parts.length > 0 ? '当前筛选: ' + parts.join(' · ') : '';
  document.getElementById('filterTag').textContent = selS.value !== 'all' ? selS.value : (selTeam !== 'all' ? selTeam : (selDate !== 'all' ? selDate.replace('VT','') : '所有数据'));
}

function updateHint(d, t, s, sellerCount) {
  var parts = [];
  if (d !== 'all') parts.push('营期:' + d.replace('VT',''));
  if (t !== 'all') parts.push('小组:' + t);
  if (s !== 'all') parts.push('销售:' + s);
  
  var hint = document.getElementById('filterHint');
  if (parts.length > 0) {
    hint.textContent = '当前筛选: ' + parts.join(' · ') + (s === 'all' ? ' (' + sellerCount + '位销售)' : '');
  } else {
    hint.textContent = '';
  }
  
  document.getElementById('filterTag').textContent = s !== 'all' ? s : (t !== 'all' ? t : (d !== 'all' ? d.replace('VT','') : '所有数据'));
}

// ====== 筛选数据 ======
function getFiltered() {
  var d = document.getElementById('fDate').value;
  var t = document.getElementById('fTeam').value;
  var s = document.getElementById('fSeller').value;
  
  var list = sellerAgg.slice();
  if (d !== 'all') list = list.filter(function(x) { return x['大期'].indexOf(d) >= 0; });
  if (t !== 'all') list = list.filter(function(x) { return x['小组'] === t; });
  if (s !== 'all') list = list.filter(function(x) { return x['花名'] === s; });
  
  var aTotal = list.reduce(function(acc, x) { return acc + x['分配数']; }, 0);
  var gTotal = list.reduce(function(acc, x) { return acc + x['GMV ']; }, 0);
  var rVal = aTotal > 0 ? (gTotal / aTotal).toFixed(2) : '0.00';
  
  return { list: list, assignTotal: aTotal, gmvTotal: gTotal, rVal: rVal };
}

  // 6 明细表
  addChart(grid, '📋 个人明细数据', 'full', function(div) {
    var html = '<div class="tbl-wrap"><table><thead><tr><th>#</th><th>花名</th><th>小组</th><th>参与</th><th>分配数</th><th>GMV</th><th>R值(元/人)</th><th>R值完成率</th><th>声测率</th><th>D0到课率</th><th>D1到课率</th></tr></thead><tbody>';
    filter.list.forEach(function(s, i) {
      var r = s['GMV '] > 0 && s['分配数'] > 0 ? (s['GMV ']/s['分配数']).toFixed(2) : '-';
      html += '<tr><td class="rank">'+(i+1)+'</td><td><b>'+s['花名']+'</b></td><td>'+s['小组']+'</td><td>'+s['参与期数']+'期/'+s['次数']+'次</td><td class="num-col">'+s['分配数'].toLocaleString()+'</td><td class="num-col">¥'+s['GMV '].toLocaleString()+'</td><td class="num-col">¥'+r+'</td><td class="num-col">'+(s['R值完成率']*100).toFixed(1)+'%</td><td class="num-col">'+(s['声测率']*100).toFixed(1)+'%</td><td class="num-col">'+(s['D0到课率']*100).toFixed(1)+'%</td><td class="num-col">'+(s['D1到课率']*100).toFixed(1)+'%</td></tr>';
    });
    html += '</tbody></table></div>';
    div.innerHTML = html;
  });
}

function addChart(grid, title, cols, makeChart) {
  var box = document.createElement('div');
  box.className = 'chart-box' + (cols==='full'?' full':'');
  box.innerHTML = '<h3>'+title+'</h3><div class="plot"></div>';
  grid.appendChild(box);
  setTimeout(function(){ makeChart(box.querySelector('.plot')); }, 30);
}

// ====== 入口 ======
function onFilterChange() {
  buildOptions();
  render();
}

// 重置
document.getElementById('resetBtn').addEventListener('click', function() {
  var selD = document.getElementById('fDate');
  var selT = document.getElementById('fTeam');
  var selS = document.getElementById('fSeller');
  
  selD.innerHTML = '<option value="all">📅 全部营期</option>';
  DATA.dates.forEach(function(d) { selD.innerHTML += '<option value="' + d + '">' + d.replace('VT','') + '</option>'; });
  
  selT.innerHTML = '<option value="all">👥 全部小组</option>';
  DATA.teams.forEach(function(t) { selT.innerHTML += '<option value="' + t + '">' + t + '</option>'; });
  
  selS.innerHTML = '<option value="all">🧑 全部销售</option>';
  DATA.sellers.forEach(function(s) { selS.innerHTML += '<option value="' + s + '">' + s + '</option>'; });
  
  selD.value = 'all';
  selT.value = 'all';
  selS.value = 'all';
  
  document.getElementById('filterHint').textContent = '';
  document.getElementById('filterTag').textContent = '所有数据';
  render();
});

document.getElementById('fDate').addEventListener('change', onFilterChange);
document.getElementById('fTeam').addEventListener('change', onFilterChange);
document.getElementById('fSeller').addEventListener('change', onFilterChange);

// ====== 启动 ======
buildOptions();
render();
</script>
